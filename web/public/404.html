<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dream Analyzer</title>
    <script type="text/javascript">
      // Simple redirect to index.html for SPA routing
      // This script will take the current path and redirect to the root with that path as a parameter
      // but since we are using multiple apps, we might need a more complex one.
      // For now, let's just redirect to the root landing if 404 happens at the root.
      // If it happens in /tma/ or /survey/, it might be better to handled them locally.
      
      var path = window.location.pathname;
      if (path.includes('/tma/')) {
        window.location.href = '/dream-analyzer/tma/index.html';
      } else if (path.includes('/survey/')) {
        window.location.href = '/dream-analyzer/survey/index.html';
      } else {
        window.location.href = '/dream-analyzer/index.html';
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
