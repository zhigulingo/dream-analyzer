name: Deploy to GitHub Pages

on:
  push:
    branches: [ vercel-export ]
    paths:
      - 'web/**'
      - 'tma/**'
      - 'survey/**'
      - '.github/workflows/deploy-gh-pages.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Web
        run: |
          cd web
          npm ci
          npm run build

      - name: Build TMA
        run: |
          cd tma
          npm ci
          npm run build

      - name: Build Survey
        run: |
          cd survey
          npm ci
          npm run build

      - name: Assemble GH Pages
        run: |
          mkdir out
          # Add .nojekyll to prevent GitHub Pages from ignoring assets
          touch out/.nojekyll
          
          echo "Assembling Web..."
          cp -r web/dist/* out/
          
          echo "Assembling TMA..."
          mkdir -p out/tma
          cp -r tma/dist/* out/tma/
          
          echo "Assembling Survey..."
          mkdir -p out/survey
          cp -r survey/dist/* out/survey/
          
          # Copy index.html as 404.html for SPA routing support
          echo "Creating 404.html..."
          cp out/index.html out/404.html
          
          echo "Deployment directory structure:"
          ls -R out

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
          clean: true
